<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شبـكـة الـحـافِـلات - Bus Network</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'routes:index' %}">شـبـكـة الـحـافـلات </a>
            <div class="d-flex text-white align-items-center">
                
                {% if user.is_authenticated %}
                    <span class="me-3">أهلاً بك، <strong>{{ user.username }}</strong>!</span>
                    <a href="{% url 'routes:my_bookings' %}" class="btn btn-warning btn-sm me-2">حـجـوزاتـي</a>
                    <form action="{% url 'routes:logout' %}" method="post" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-sm">تـسـجـيـل الـخـروج</button>
                    </form>
                
                {% else %}
                    <a href="{% url 'routes:login' %}" class="btn btn-light btn-sm me-2">تـسـجـيـل الـدخـول</a>
                    <a href="{% url 'routes:register' %}" class="btn btn-outline-light btn-sm">إنـشـاء حـسـاب</a>
                
                {% endif %}
                
            </div>
        </div>
    </nav>

    <div class="container">
        {% block body %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
